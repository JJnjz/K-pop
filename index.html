<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Universe - XLOV, KATSEYE, LE SSERAFIM, TWICE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #ff007a;
            --bg-dark: #0a0a0c;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
        }

        .heading-font {
            font-family: 'Syncopate', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tab-btn.active {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 122, 0.4);
        }

        .group-btn.active {
            border-bottom: 3px solid var(--accent);
            color: var(--accent);
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-gradient {
            background: linear-gradient(to right, #000, #1a1a1a);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header / Nav -->
    <nav class="nav-gradient p-6 sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="heading-font text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500">
                K-POP UNIVERSE
            </h1>
            <div id="group-nav" class="flex gap-4 sm:gap-8 text-sm font-bold uppercase tracking-widest">
                <button onclick="switchGroup('xlov')" class="group-btn active" id="btn-xlov">XLOV</button>
                <button onclick="switchGroup('katseye')" class="group-btn" id="btn-katseye">KATSEYE</button>
                <button onclick="switchGroup('lesserafim')" class="group-btn" id="btn-lesserafim">LE SSERAFIM</button>
                <button onclick="switchGroup('twice')" class="group-btn" id="btn-twice">TWICE</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-6 md:p-12">
        <div id="content-area" class="fade-in">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <script>
        const groupData = {
            xlov: {
                name: "XLOV",
                desc: "A revolutionary 4-member boy group known for their 'genderless' concept and experimental R&B sounds.",
                members: ["Wumuti (Leader)", "Rui", "Hyun", "Haru"],
                songs: ["I'mma Be", "1&Only", "Rizz", "Biii:-P", "Scent"],
                choreo: ["I'mma Be (Powerful House)", "1&Only (Artistic Contemporary)", "Rizz (Experimental Movement)"]
            },
            katseye: {
                name: "KATSEYE",
                desc: "The global girl group formed via 'Dream Academy', blending American pop with rigorous K-pop performance standards.",
                members: ["Sophia (Leader)", "Daniela", "Lara", "Manon", "Megan", "Yoonchae"],
                songs: ["Touch", "Debut", "Gnarly", "Gabriela", "Pinky Up"],
                choreo: ["Touch (Viral Softness)", "Debut (Hard-hitting Pop)", "Gnarly (Hyper-dynamic)"]
            },
            lesserafim: {
                name: "LE SSERAFIM",
                desc: "Source Music's powerhouse group defined by their 'FEARLESS' attitude and unmatched stage presence.",
                members: ["Kim Chaewon (Leader)", "Sakura", "Huh Yunjin", "Kazuha", "Hong Eunchae"],
                songs: ["ANTIFRAGILE", "FEARLESS", "UNFORGIVEN", "Perfect Night", "CRAZY"],
                choreo: ["ANTIFRAGILE (Muscle Flex)", "Smart (Afrobeats Fusion)", "CRAZY (Voguing Elements)"]
            },
            twice: {
                name: "TWICE",
                desc: "The Nation's Girl Group, world-renowned for their catchy hooks, iconic point choreographies, and vibrant energy.",
                members: ["Jihyo (Leader)", "Nayeon", "Jeongyeon", "Momo", "Sana", "Mina", "Dahyun", "Chaeyoung", "Tzuyu"],
                songs: ["What is Love?", "TT", "Fancy", "I Can't Stop Me", "Cheer Up"],
                choreo: ["TT (Crying Emoji Point)", "Cheer Up (Shy Shy Shy)", "Fancy (Finger Pointing)"]
            }
        };

        let currentGroup = 'xlov';
        let currentTab = 'members';

        function switchGroup(groupId) {
            currentGroup = groupId;
            // Update nav UI
            document.querySelectorAll('.group-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${groupId}`).classList.add('active');
            renderContent();
        }

        function switchTab(tabId) {
            currentTab = tabId;
            renderContent();
        }

        function renderContent() {
            const data = groupData[currentGroup];
            const area = document.getElementById('content-area');
            
            area.innerHTML = `
                <div class="mb-10 text-center">
                    <h2 class="heading-font text-5xl font-extrabold mb-4">${data.name}</h2>
                    <p class="text-gray-400 max-w-2xl mx-auto">${data.desc}</p>
                </div>

                <div class="flex justify-center gap-3 mb-10">
                    <button onclick="switchTab('members')" class="tab-btn px-6 py-2 rounded-full font-bold transition ${currentTab === 'members' ? 'active' : 'bg-white/5'}">Members</button>
                    <button onclick="switchTab('songs')" class="tab-btn px-6 py-2 rounded-full font-bold transition ${currentTab === 'songs' ? 'active' : 'bg-white/5'}">Songs</button>
                    <button onclick="switchTab('choreo')" class="tab-btn px-6 py-2 rounded-full font-bold transition ${currentTab === 'choreo' ? 'active' : 'bg-white/5'}">Choreographies</button>
                </div>

                <div id="tab-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">
                    ${renderTabItems(data)}
                </div>
            `;
        }

        function renderTabItems(data) {
            let items = [];
            let icon = '';
            
            if (currentTab === 'members') {
                items = data.members;
                icon = 'fa-user-astronaut';
            } else if (currentTab === 'songs') {
                items = data.songs;
                icon = 'fa-compact-disc';
            } else {
                items = data.choreo;
                icon = 'fa-person-rays';
            }

            return items.map(item => `
                <div class="glass-card p-8 rounded-2xl flex flex-col items-center text-center group hover:bg-white/10">
                    <div class="w-16 h-16 rounded-full bg-pink-500/20 flex items-center justify-center mb-4 group-hover:scale-110 transition">
                        <i class="fas ${icon} text-pink-500 text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-bold uppercase tracking-tight">${item}</h3>
                    <p class="text-xs text-white/40 mt-2">Essential ${currentTab.slice(0,-1)} Profile</p>
                </div>
            `).join('');
        }

        // Initialize
        renderContent();
    </script>
</body>
</html>
